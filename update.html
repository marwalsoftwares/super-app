<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{

width:420px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);

}

button{

padding:10px 20px;
margin-top:15px;
margin-right:10px;
border:none;
border-radius:5px;
cursor:pointer;

}

.update{
background:#28a745;
color:white;
}

.later{
background:#ccc;
}

#log{

background:#fafafa;
border:1px solid #ddd;
padding:10px;
height:100px;
overflow:auto;
margin-top:10px;

}

</style>

</head>

<body>

<div class="box">

<h2>🚀 New Update Available</h2>

<p>
Current Version: <b id="current"></b><br>
Latest Version: <b id="latest"></b>
</p>

<h4>Changes</h4>

<div id="log"></div>

<button class="update" onclick="update()">Update</button>
<button class="later" onclick="closeWin()">Later</button>

</div>

<script>

const { ipcRenderer } = require("electron")

ipcRenderer.on("update-info",(event,data)=>{

document.getElementById("current").innerText=data.current
document.getElementById("latest").innerText=data.latest
document.getElementById("log").innerText=data.body

})

function update(){

window.electronAPI.startUpdate()

}

function closeWin(){

window.close()

}

</script>

</body>

</html>
