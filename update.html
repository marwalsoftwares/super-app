<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>New Update Available</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.box{

background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);

}

button{

padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;

}

.yes{

background:#28a745;
color:white;

}

.no{

background:#dc3545;
color:white;

}

</style>

</head>

<body>

<div class="box">

<h2>🚀 New Update Available</h2>

<p id="version"></p>

<h4>What's New</h4>

<ul>

<li>Bug Fixes</li>
<li>Performance Improvements</li>
<li>New Features Added</li>

</ul>

<p>Do you want to update now?</p>

<button class="yes" onclick="update()">Yes Update</button>

<button class="no" onclick="closeApp()">Later</button>

</div>

<script>

const { ipcRenderer } = require("electron")

function update(){

const url="https://github.com/marwalsoftwares/super-app/releases/latest/download/update.zip"

ipcRenderer.send("start-update",url)

}

function closeApp(){

window.close()

}

</script>

</body>

</html>
