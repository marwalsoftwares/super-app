<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Super App Update</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:5px;
cursor:pointer;
}

.yes{
background:#28a745;
color:white;
}

.no{
background:#dc3545;
color:white;
}

</style>

</head>

<body>

<div class="box">

<h2>🚀 New Update Available</h2>

<p>A new version of Super App is available.</p>

<h4>What's New</h4>

<ul>
<li>Performance improvements</li>
<li>Bug fixes</li>
<li>New features added</li>
</ul>

<p>Do you want to update now?</p>

<button class="yes" onclick="update()">Yes Update</button>

<button class="no" onclick="later()">Later</button>

</div>

<script>

const { ipcRenderer } = require("electron")

function update(){

ipcRenderer.send("start-update")

}

function later(){

window.close()

}

</script>

</body>

</html>
