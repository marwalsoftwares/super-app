<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super App Update</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{

width:420px;
background:white;
border-radius:10px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;

}

h2{
margin-top:0;
color:#333;
}

.version{
color:#666;
margin-bottom:20px;
}

.changelog{

text-align:left;
background:#fafafa;
border:1px solid #ddd;
padding:10px;
height:120px;
overflow:auto;
border-radius:5px;

}

.buttons{

margin-top:20px;

}

button{

padding:10px 20px;
border:none;
border-radius:5px;
font-size:15px;
cursor:pointer;

}

.update{

background:#28a745;
color:white;

}

.later{

background:#ccc;

}

</style>

</head>

<body>

<div class="card">

<h2>🚀 New Update Available</h2>

<div class="version">
Current Version: <span id="current"></span><br>
Latest Version: <span id="latest"></span>
</div>

<h4>Changes</h4>

<div class="changelog" id="changelog">
Loading...
</div>

<div class="buttons">

<button class="update" onclick="startUpdate()">Update Now</button>

<button class="later" onclick="closeWin()">Later</button>

</div>

</div>

<script>

const { ipcRenderer } = require("electron")

ipcRenderer.on("update-info",(event,data)=>{

document.getElementById("current").innerText=data.current
document.getElementById("latest").innerText=data.latest
document.getElementById("changelog").innerText=data.body || "No changelog available"

})

function startUpdate(){

ipcRenderer.send("start-update")

}

function closeWin(){

window.close()

}

</script>

</body>
</html>
